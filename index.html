<script>
    function recommendMovie(genre) {
        let movie = "";

        if (genre === "action") {
            movie = "Mad Max: Fury Road";
        } else if (genre === "comedy") {
            movie = "The Hangover";
        } else if (genre === "thriller") {
            movie = "Inception";
        }

        document.getElementById("result").innerHTML = "🎥 Recommended Movie: " + movie;
    }
</script>
